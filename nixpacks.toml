[phases.setup]
nixPkgs = [
    "php82",
    "php82Packages.composer",
    "nodejs",
    "npm",
    "libpng",
    "libjpeg",
    "freetype",
    "pkg-config"
]

[phases.build]
cmds = [
    "composer install --ignore-platform-reqs --no-interaction --no-scripts --prefer-dist --optimize-autoloader --no-dev",
    "npm install",
    "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=$PORT"