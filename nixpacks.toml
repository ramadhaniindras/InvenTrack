[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs", "npm", "libpng", "libjpeg", "freetype"]

[phases.build]
cmds = [
    "composer install --no-dev",
    "npm install",
    "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"